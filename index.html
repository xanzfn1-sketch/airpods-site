<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BB2 Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>BB2 STORE</h1>
</div>

<!-- HEADER -->
<header>
    <div class="logo">BB2 STORE</div>

    <div class="info">
        <p>Seller: Rayyan Adam</p>
        <p>Support: WhatsApp Available</p>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Premium AirPods</h1>
    <p>Fast UK Delivery • Trusted Seller • BB2 Based</p>
</section>

<!-- PRODUCTS -->
<section class="pricing">

    <div class="card">
        <h2>1 Pair</h2>
        <h1>£15</h1>
        <button class="btn" onclick="addToCart('1 Pair - £15')">Add to Basket</button>
    </div>

    <div class="card">
        <h2>2 Pairs</h2>
        <h1>£25</h1>
        <button class="btn" onclick="addToCart('2 Pairs - £25')">Add to Basket</button>
    </div>

    <div class="card">
        <h2>5 Pairs</h2>
        <h1>£60</h1>
        <button class="btn" onclick="addToCart('5 Pairs - £60')">Add to Basket</button>
    </div>

    <div class="card">
        <h2>Bulk Deal</h2>
        <h1>£150</h1>
        <p>Best Value Package</p>
        <button class="btn" onclick="addToCart('Bulk - £150')">Add to Basket</button>
    </div>

</section>

<!-- NAV BUTTONS -->
<div class="buttons">

    <a href="cart.html"><button class="btn">🧺 Basket</button></a>
    <a href="reviews.html"><button class="btn">⭐ Reviews</button></a>
    <a href="order.html"><button class="btn">🛒 Order</button></a>

</div>

<!-- CONTACT -->
<section class="contact">

    <h2>Contact</h2>
    <p>📞 07463 399522</p>

    <a href="tel:07463399522"><button class="btn">Call Now</button></a>
    <a href="https://wa.me/447463399522" target="_blank"><button class="btn">WhatsApp</button></a>

</section>

<!-- FLOAT CHAT -->
<button id="chatButton">💬</button>

<div id="chatBox">

    <div class="chat-header">
        BB2 Support
        <span onclick="closeChat()">✖</span>
    </div>

    <form action="https://formspree.io/f/mzdlagqp" method="POST">

        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Ask a question..." required></textarea>

        <button class="btn" type="submit">Send</button>

    </form>

</div>

<script src="script.js"></script>

<script>
const chatBox = document.getElementById("chatBox");

document.getElementById("chatButton").onclick = () => {
    chatBox.style.display = "block";
};

function closeChat(){
    chatBox.style.display = "none";
}
</script>

</body>
</html>
