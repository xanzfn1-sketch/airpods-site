<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moncler Drop | BB2 Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">BB2 STORE</div>
        <nav style="display: flex; gap: 20px; align-items: center;">
            <a href="index.html" style="color: #ffffff; text-decoration: none;">Store</a>
            <a href="moncler.html" style="color: #ff453a; text-decoration: none; font-weight: 600;">Moncler Drop</a>
            <button class="cart-trigger" onclick="toggleCart(true)">Basket</button>
        </nav>
    </header>

    <main class="container" style="padding-top: 50px;">
        <section class="hero">
            <h1>Moncler Collection</h1>
            <p>Premium quality, limited availability. Same-day delivery in BB2.</p>
        </section>

        <!-- Moncler Grid -->
        <section id="moncler-products" class="grid">
            <!-- Items injected by JS or hardcoded -->
            <div class="card">
                <h2>Moncler Gilet</h2>
                <h1>£85</h1>
                <button class="btn" onclick="addToCart('Moncler Gilet', 85)">Add to Basket</button>
            </div>
            <div class="card">
                <h2>Moncler Maya Jacket</h2>
                <h1>£140</h1>
                <button class="btn" onclick="addToCart('Moncler Maya', 140)">Add to Basket</button>
            </div>
            <div class="card">
                <h2>Moncler Beanie</h2>
                <h1>£35</h1>
                <button class="btn" onclick="addToCart('Moncler Beanie', 35)">Add to Basket</button>
            </div>
        </section>
    </main>

    <!-- Cart Drawer (Included for consistency) -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-drawer-overlay" onclick="toggleCart(false)"></div>
        <div class="cart-drawer-content">
            <div class="cart-drawer-header">
                <h2>Your Basket</h2>
                <button class="close-drawer" onclick="toggleCart(false)">✕</button>
            </div>
            <div id="cart-items-container"></div>
            <div class="cart-drawer-footer">
                <div class="total-row"><span>Total:</span> <span id="total">£0</span></div>
                <button class="btn checkout-btn" onclick="checkout()">Checkout via WhatsApp</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© BB2 Store — All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Optional helper to ensure adding items here works with your global cart
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let item = cart.find(i => i.name === name);
            item ? item.qty++ : cart.push({ name, price, qty: 1 });
            localStorage.setItem("cart", JSON.stringify(cart));
            alert(name + " added to basket!");
        }
    </script>
</body>
</html>
