<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Place Your Order</h1>
    <p class="sub">Only available in BB2</p>

    <form class="order-form">

        <input type="email" placeholder="Email Address" required>

        <input type="text" placeholder="Delivery Address (BB2 only)" required>

        <input type="text" placeholder="Discount Code (optional)">

        <select required>
            <option value="">Select Bundle</option>
            <option>1 Pair - £15</option>
            <option>2 Pairs - £25</option>
            <option>5 Pairs - £60</option>
            <option>Bulk Deal - £150</option>
        </select>

        <button type="submit">Submit Order</button>

    </form>

    <a href="index.html" style="display:inline-block;margin-top:20px;color:#00ff99;">
        ← Back to Store
    </a>

</div>

</body>
</html>
