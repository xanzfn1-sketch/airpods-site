<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Place Your Order | BB2 AirPods</title>



    <link rel="stylesheet" href="style.css">

</head>



<body>



<div class="background"></div>



<header>



    <div class="logo">

        <h2>BB2 AirPods</h2>

    </div>



    <div class="info">

        <p>Seller: <strong>Rayyan Adam</strong></p>

        <p>Website by <strong>Adam</strong></p>

    </div>



</header>



<section class="hero">



    <span class="badge">ORDER FORM</span>



    <h1>Place Your Order</h1>



    <p>Only available in BB2</p>



</section>



<section class="contact">



<form

action="https://formspree.io/f/mzdlagqp"

method="POST"

class="order-form">



<input

type="text"

name="name"

placeholder="Full Name"

required>



<input

type="email"

name="email"

placeholder="Email Address"

required>



<input

type="tel"

name="phone"

placeholder="Phone Number"

required>



<input

type="text"

name="address"

placeholder="Delivery Address (BB2 Only)"

required>



<select name="bundle" required>



<option value="">Select Bundle</option>



<option>1 Pair - £15</option>



<option>2 Pairs - £25</option>



<option>5 Pairs - £60</option>



<option>Bulk Deal - £150 (Get 5 FREE)</option>



</select>



<input

type="text"

name="discount"

placeholder="Discount Code (Optional)">



<textarea

name="notes"

rows="5"

placeholder="Extra Notes (Optional)">

</textarea>



<button class="btn" type="submit">



Submit Order



</button>



</form>



<br>



<a href="index.html">



<button class="btn secondary">



← Back to Store



</button>



</a>



</section>



</body>

</html>
