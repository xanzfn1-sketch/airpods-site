<!DOCTYPE html>
<html>
<head>
<title>Verify</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="centerBox">

<h1>Security Check</h1>
<p>Verify you are not a robot</p>

<p id="codeBox"></p>

<input id="inputCode" placeholder="Enter code">

<button class="btn" onclick="check()">Verify</button>

<p id="msg"></p>

</div>

<script>

let code = Math.floor(1000 + Math.random()*9000);
document.getElementById("codeBox").innerText = "Code: " + code;

function check(){
let val = document.getElementById("inputCode").value;

if(val == code){
localStorage.setItem("verified","true");
window.location.href="index.html";
}else{
document.getElementById("msg").innerText="Incorrect, try again";
}
}

</script>

</body>
</html>
