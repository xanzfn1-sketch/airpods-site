<script>
const container = document.getElementById("reviewsContainer");

const names = ["L••••","J••••","M••••","A••••","D••••","S••••","K••••","T••••"];
const comments = [
"Fast delivery",
"Great quality",
"Trusted seller",
"Would buy again",
"Perfect condition",
"Quick replies",
"Best prices",
"Legit seller"
];

// create reviews but DO NOT show them yet
let reviews = [];

for(let i = 0; i < 150; i++){
    const div = document.createElement("div");
    div.className = "card review hidden";

    const name = names[Math.floor(Math.random() * names.length)];
    const comment = comments[Math.floor(Math.random() * comments.length)];

    div.textContent = `⭐⭐⭐⭐⭐ ${comment} — ${name}`;

    container.appendChild(div);
    reviews.push(div);
}

// reveal one by one
function showOneByOne(i = 0){
    if(i >= reviews.length) return;

    reviews[i].classList.remove("hidden");
    reviews[i].classList.add("show");

    setTimeout(() => {
        showOneByOne(i + 1);
    }, 40); // speed (lower = faster)
}

// start after page loads
window.onload = () => {
    showOneByOne();
};
</script>
