<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews | BB2 Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<header>
    <div class="logo">
        <h2>BB2 Store</h2>
    </div>
</header>

<section class="hero">
    <h1>Customer Reviews</h1>
    <p>Verified 5★ purchases</p>
</section>

<div id="reviewsContainer" class="reviews"></div>

<a href="index.html">
    <button class="btn">← Back</button>
</a>

<script>
const names = ["L••••","J••••","M••••","A••••","D••••","S••••","K••••","T••••","R••••","H••••"];

const comments = [
"Fast delivery",
"Best quality AirPods",
"Trusted seller",
"Very smooth deal",
"Would buy again",
"Perfect condition",
"Quick replies",
"Highly recommended",
"Great price",
"Legit seller"
];

const container = document.getElementById("reviewsContainer");

// generate 200 reviews
for(let i = 0; i < 200; i++){

    const div = document.createElement("div");
    div.className = "card review";

    const name = names[Math.floor(Math.random() * names.length)];
    const comment = comments[Math.floor(Math.random() * comments.length)];

    div.innerHTML = `⭐⭐⭐⭐⭐ ${comment} — ${name}`;

    container.appendChild(div);
}

// scroll animation fix
const reviews = document.querySelectorAll(".review");

function showReviews(){
    const trigger = window.innerHeight * 0.85;

    reviews.forEach(r => {
        const top = r.getBoundingClientRect().top;

        if(top < trigger){
            r.classList.add("show");
        }
    });
}

window.addEventListener("scroll", showReviews);
showReviews();
</script>

</body>
</html>
