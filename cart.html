<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB2 Basket</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">YOUR BASKET</div>
        <nav><a href="index.html" style="color: #fff; text-decoration: none; font-weight: 600;">Store</a></nav>
    </header>

    <main class="container" style="padding-top: 40px;">
        <!-- Container for items injected by script.js -->
        <section id="cart-items-container" class="infoBlock">
            <h2>Items in Basket</h2>
        </section>

        <!-- Total display -->
        <div class="infoBlock" style="text-align: center;">
            <h2 id="total">Total: £0</h2>
        </div>

        <!-- Action Buttons -->
        <div class="actions" style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 20px auto;">
            <button class="btn" onclick="checkout()" style="background: #ff453a; color: #fff;">
                Checkout (Same Day Delivery)
            </button>
            <a href="index.html" class="btn" style="background: #121212; border: 1px solid #333; color: #fff; text-align: center; text-decoration: none;">
                Back to Store
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>© BB2 Store — All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Ensure the basket renders when this page loads
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof renderCart === 'function') {
                renderCart();
            }
        });
    </script>
</body>
</html>
