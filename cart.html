<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BB2 Store - Basket</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#1a1a1a;
    color:white;
    padding:20px;
    margin:15px 0;
    border-radius:15px;
}

.total{
    font-size:28px;
    font-weight:bold;
    margin-top:30px;
}

.btn{
    margin:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🧺 Your Basket</h1>

<div id="cartItems"></div>

<h2 class="total" id="total">Total: £0</h2>

<button class="btn" onclick="clearBasket()">Clear Basket</button>

<a href="index.html">
    <button class="btn">← Continue Shopping</button>
</a>

<a href="order.html">
    <button class="btn">Checkout</button>
</a>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const prices = {
    "1 Pair - £15":15,
    "2 Pairs - £25":25,
    "5 Pairs - £60":60,
    "Bulk - £150":150
};

function displayCart(){

    const cartItems = document.getElementById("cartItems");
    const total = document.getElementById("total");

    cartItems.innerHTML="";

    let totalPrice = 0;

    if(cart.length===0){
        cartItems.innerHTML="<p>Your basket is empty.</p>";
        total.innerHTML="Total: £0";
        return;
    }

    cart.forEach((item,index)=>{

        totalPrice += prices[item] || 0;

        const div=document.createElement("div");

        div.className="card";

        div.innerHTML=`
            <h3>${item}</h3>

            <button class="btn" onclick="removeItem(${index})">
                Remove
            </button>
        `;

        cartItems.appendChild(div);

    });

    total.innerHTML="Total: £"+totalPrice;

}

function removeItem(index){

    cart.splice(index,1);

    localStorage.setItem("cart",JSON.stringify(cart));

    displayCart();

}

function clearBasket(){

    cart=[];

    localStorage.setItem("cart",JSON.stringify(cart));

    displayCart();

}

displayCart();

</script>

</body>
</html>
