<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Your Basket 🧺</h1>

    <div id="cartItems"></div>

    <br>

    <a href="index.html">
        <button class="btn">← Back to Store</button>
    </a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const box = document.getElementById("cartItems");

if(cart.length === 0){
    box.innerHTML = "<p>Basket is empty</p>";
} else {
    cart.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.textContent = "🛒 " + item;
        box.appendChild(div);
    });
}
</script>

</body>
</html>
