<!DOCTYPE html>
<html>
<head>
<title>Track Order</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Order Tracking</h1>

<input id="orderId" placeholder="Enter Order ID">
<button class="btn" onclick="track()">Track</button>

<div id="result"></div>

<script>

async function track(){

const id = document.getElementById("orderId").value;

const res = await fetch("/api/order/" + id);
const data = await res.json();

if(data.error){
document.getElementById("result").innerHTML = "Order not found";
return;
}

document.getElementById("result").innerHTML = `
<div class="card">
<h2>${data.id}</h2>
<p>Status: ${data.status}</p>
<p>Items: ${data.items.map(i=>i.name).join(", ")}</p>
</div>
`;

}

/* auto load from URL */
const params = new URLSearchParams(window.location.search);
if(params.get("id")){
document.getElementById("orderId").value = params.get("id");
track();
}

</script>

</body>
</html>
